name: Terraform Deployment-$(Build.SourceBranchName)-$(Build.BuildId)

trigger:
  branches:
    include:
      - main
    exclude:
      - dev
  paths:
    exclude:
      - '**/*.md'
      - '**/*.txt'
pr: 
  branches:
    include:
      - main
#Parameters - are a way to pass runtime inputs 
#Parameters are typed values defined at the top of your YAML pipeline that are evaluated at compile time (before the run starts).#
parameters:
  - name: enviroment
    displayName: 'enviroment'
    default: dev
    values:
      - staging
      - dev 
      - prod

  - name: action
    displayName: 'terraform action'
    type: string
    values:
      - plan
      - apply
      - destory
    default: plan
  
  - name: terraformversion
    displayName: 'terrform version'
    type: string
    default: "3.0"

  - name: costanalysis
    displayName: 'cost analysis (Infracost)'
    type: boolean
    default: true
  
  - name:  forceapply
    displayName: 'force apply skip approval gate'
    type: boolean
    default: false

variables:
  # Global Variables
  tf_version: ${{ parameters.terraformversion }} 
  tf_working_dir: $(System.DefaultWorkingDirectory)
  tf_backend_rg: 'backend-rg'
  tf_backend_storage: 'backendstgaviinash'$(Build.Repository.Name)
  tf_backend_key: ${{ parameters.enviroment }}/terraform.tfstate
  artifact_name: 'terraform-plan-${{ parameters.enviroment }}'
  
  ${{ if (parameters.enviroment, 'dev') }}:
    env_variable_group: 'vg-terraform-dev'
    tf_workspace: 'dev'
    



pool:
   name: Default

stages:
- stage: A
  displayName: stage1
  pool: Default
  jobs: 
  - job: Terraform
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'SVB'
        backendAzureRmResourceGroupName: 'backend-rg'
        backendAzureRmStorageAccountName: 'backendstgaviinash'
        backendAzureRmContainerName: 'terraform-backend'
        backendAzureRmKey: 'terraform.tfstate'
    - task: TerraformTaskV4@4
      displayName: Terraform plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'SVB'
