name: Terraform Deployment-$(Build.SourceBranchName)-$(Build.BuildId)

trigger:
  branches:
    include:
      - main
    exclude:
      - dev
  paths:
    exclude:
      - '**/*.md'
      - '**/*.txt'
pr: 
  branches:
    include:
      - main
####################### Parameters - are a way to pass runtime inputs ####################
parameters:
  - name: enviroment
    displayName: 'enviroment'
    default: dev
    values:
      - staging
      - dev 
      - prod

  - name: action
    displayName: 'terraform action'
    type: string
    values:
      - plan
      - apply
      - destory
    default: plan
  
  - name: terraformversion
    displayName: 'terrform version'
    type: string
    default: "3.0"

  - name: costanalysis
    displayName: 'cost analysis (Infracost)'
    type: boolean
    default: true
  
  - name:  forceapply
    displayName: 'force apply skip approval gate'
    type: boolean
    default: false


pool: Default

stages:
- stage: A
  displayName: stage1
  pool: Default
  jobs: 
  - job: Terraform
    steps:
    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'SVB'
        backendAzureRmResourceGroupName: 'backend-rg'
        backendAzureRmStorageAccountName: 'backendstgaviinash'
        backendAzureRmContainerName: 'terraform-backend'
        backendAzureRmKey: 'terraform.tfstate'
    - task: TerraformTaskV4@4
      displayName: Terraform plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'SVB'
