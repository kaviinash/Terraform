trigger: none
name: Terraform
pool: Default

stages:
- stage: A
  displayName: stage1
  pool: Default
  jobs: 
  - job: A
    displayName: Terraform init
    steps: 
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'SVB'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az account show
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendAzureRmUseEntraIdForAuthentication: false
        backendServiceArm: 'SVB'
        backendAzureRmResourceGroupName: 'backend-rg'
        backendAzureRmStorageAccountName: 'backendstgaviinash'
        backendAzureRmContainerName: 'terraform-backend'
        backendAzureRmKey: 'terraform.tfstate'

